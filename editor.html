<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="color-scheme" content="dark">
<title>편집장 · 이은재서점</title>
<style>
  :root {
    --bg: #000;
    --card: #1C1C1E;
    --card-elevated: #2C2C2E;
    --card-press: #3A3A3C;
    --fg: #FFFFFF;
    --fg2: rgba(235,235,245,0.88);
    --muted: rgba(235,235,245,0.6);
    --muted2: rgba(235,235,245,0.3);
    --separator: rgba(84,84,88,0.55);
    --accent: #0A84FF;
    --fresh: #30D158;
    --pick: #FF9F0A;
    --hide: #FF453A;
    --note: #BF5AF2;
    --chip-bg: rgba(118,118,128,0.24);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Pretendard Variable", "Pretendard",
      "Apple SD Gothic Neo", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; font-feature-settings: "ss01","tnum"; }
  a { color: inherit; text-decoration: none; }

  /* 상단 — 라지 타이틀 + 통계 */
  .hero { padding: 20px 20px 4px; }
  .hero h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.6px; margin: 0; }
  .hero p { font-size: 13px; color: var(--muted); margin: 4px 0 0; }

  .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    padding: 14px 20px 0; }
  .stat { background: var(--card); border-radius: 12px; padding: 12px 10px; text-align: center; }
  .stat .label { font-size: 11px; color: var(--muted); letter-spacing: -0.1px; }
  .stat .num { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-top: 2px;
    font-variant-numeric: tabular-nums; }
  .stat.fresh .num { color: var(--fresh); }
  .stat.pick .num { color: var(--pick); }
  .stat.hide .num { color: var(--hide); }

  /* 세그먼티드 */
  .seg-wrap { padding: 12px 20px 0; }
  .segmented { display: flex; background: var(--chip-bg); border-radius: 11px; padding: 2px; }
  .seg { flex: 1; padding: 9px 0; font-size: 14px; font-weight: 600; color: var(--fg);
    border-radius: 9px; cursor: pointer; user-select: none; text-align: center; }
  .seg.active { background: rgba(118,118,128,0.6); box-shadow: 0 1px 2px rgba(0,0,0,0.4); }

  /* 필터 칩 */
  .chip-row { display: flex; gap: 6px; padding: 12px 20px 4px; overflow-x: auto;
    scrollbar-width: none; }
  .chip-row::-webkit-scrollbar { display: none; }
  .chip { padding: 6px 12px; font-size: 12.5px; font-weight: 500; color: var(--fg2);
    background: var(--card); border: 0.5px solid var(--separator); border-radius: 999px;
    cursor: pointer; white-space: nowrap; user-select: none; }
  .chip.active { background: var(--fg); color: #000; border-color: var(--fg); font-weight: 600; }
  .chip.pick-chip.active { background: var(--pick); border-color: var(--pick); color: #000; }
  .chip.hide-chip.active { background: var(--hide); border-color: var(--hide); color: #fff; }
  .chip.note-chip.active { background: var(--note); border-color: var(--note); color: #fff; }

  /* I/O 도구 */
  .io-row { display: flex; gap: 8px; padding: 10px 20px 8px; }
  .io-btn { flex: 1; padding: 9px 0; font-size: 12.5px; font-weight: 600; color: var(--fg);
    background: var(--card); border: 0.5px solid var(--separator); border-radius: 8px;
    cursor: pointer; text-align: center; }
  .io-btn:active { background: var(--card-press); }
  .io-btn.danger { color: var(--hide); }

  /* 카드 리스트 — 편집장은 한 화면에 많이 보게 작은 카드 */
  .list { padding: 8px 20px calc(80px + env(safe-area-inset-bottom, 0px)); }
  .row { display: grid; grid-template-columns: 56px 1fr auto; gap: 12px;
    padding: 10px; background: var(--card); border-radius: 12px; margin-bottom: 8px;
    align-items: start; transition: opacity 0.15s; }
  .row.hidden-row { opacity: 0.4; }
  .row.picked-row { box-shadow: 0 0 0 2px var(--pick) inset; }
  .row .cover { width: 56px; height: 84px; border-radius: 6px; overflow: hidden;
    background: var(--card-elevated); flex-shrink: 0; }
  .row .cover img { width: 100%; height: 100%; object-fit: cover; }
  .row .cover .ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    padding: 4px; text-align: center; font-size: 10px; font-weight: 600; color: rgba(235,235,245,0.55);
    line-height: 1.2; word-break: keep-all; background: linear-gradient(135deg, #2C2C2E 0%, #1C1C1E 100%); }
  .row .body { min-width: 0; }
  .row .title { font-size: 14px; font-weight: 600; letter-spacing: -0.2px; line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .row .who { font-size: 12px; color: var(--muted); margin-top: 2px; letter-spacing: -0.1px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row .src { font-size: 11px; color: var(--muted2); margin-top: 4px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row .actions { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
  .row .actions button { background: transparent; border: 0.5px solid var(--separator);
    color: var(--muted); font-size: 16px; width: 32px; height: 32px; border-radius: 8px;
    cursor: pointer; padding: 0; line-height: 1; }
  .row .actions button.on-pick { background: var(--pick); color: #000; border-color: var(--pick); }
  .row .actions button.on-hide { background: var(--hide); color: #fff; border-color: var(--hide); }
  .row .actions button.on-note { background: var(--note); color: #fff; border-color: var(--note); }
  .row .note-area { grid-column: 1 / -1; margin-top: 8px; display: none; }
  .row.note-open .note-area { display: block; }
  .row .note-area textarea { width: 100%; min-height: 56px; padding: 8px 10px; font-size: 13px;
    background: var(--card-elevated); color: var(--fg); border: 0.5px solid var(--separator);
    border-radius: 8px; outline: none; resize: vertical; font-family: inherit;
    letter-spacing: -0.2px; }

  .empty { padding: 60px 24px; text-align: center; color: var(--muted); font-size: 14px; line-height: 1.6; }
  .empty .icon { font-size: 36px; opacity: 0.4; margin-bottom: 8px; }

  .footer { padding: 20px; text-align: center; color: var(--muted2); font-size: 11px;
    line-height: 1.7; }
  .footer a { color: var(--accent); }

  /* 토스트 */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(60,60,67,0.95); color: white; padding: 10px 20px;
    border-radius: 999px; font-size: 13px; font-weight: 500;
    opacity: 0; transition: all 0.2s ease; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="hero">
  <h1>📝 편집장 · 이은재서점</h1>
  <p>크롤된 책을 검토하고 ⭐ 픽, 🙈 숨김, 📝 메모. 변경은 localStorage 에 저장.</p>
</div>

<div class="stat-row">
  <div class="stat fresh"><div class="label">오늘 신간</div><div class="num" id="s-today">—</div></div>
  <div class="stat"><div class="label">전체</div><div class="num" id="s-total">—</div></div>
  <div class="stat pick"><div class="label">⭐ 픽</div><div class="num" id="s-pick">—</div></div>
  <div class="stat hide"><div class="label">🙈 숨김</div><div class="num" id="s-hide">—</div></div>
</div>

<div class="seg-wrap">
  <div class="segmented">
    <div class="seg active" data-tab="manga">🎬 만화</div>
    <div class="seg" data-tab="indie">📚 독립서점</div>
  </div>
</div>

<div class="chip-row">
  <span class="chip active" data-filter="all">전체</span>
  <span class="chip" data-filter="unreviewed">미검토</span>
  <span class="chip pick-chip" data-filter="picked">⭐ 픽만</span>
  <span class="chip note-chip" data-filter="noted">📝 메모만</span>
  <span class="chip hide-chip" data-filter="hidden">🙈 숨김만</span>
</div>

<div class="io-row">
  <button class="io-btn" id="btn-export">📤 JSON 내보내기</button>
  <button class="io-btn" id="btn-import">📥 가져오기</button>
  <button class="io-btn danger" id="btn-reset">🔄 초기화</button>
</div>

<div class="list" id="list"></div>

<div class="footer">
  편집장 변경은 사용자 브라우저에만 저장됩니다 (localStorage).<br>
  여러 기기에서 쓰려면 JSON 내보내기 → 가져오기.<br>
  <a href="/">← 사이트로 돌아가기</a>
</div>

<div class="toast" id="toast"></div>

<script src="data/manga.js"></script>
<script src="data/indie.js"></script>
<script>
  const datasets = {
    manga: (window.__MANGA_DATA__ || { books: [] }),
    indie: (window.__INDIE_DATA__ || { books: [] }),
  };
  const STORAGE_KEY = 'eunjae_editor_v1';
  const state = { tab: 'manga', filter: 'all', curation: {} };

  // localStorage 로드
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state.curation = JSON.parse(raw) || {};
  } catch (e) { state.curation = {}; }

  function persist() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.curation));
  }
  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }
  function bookKey(b) {
    const t = (b.title || '').toLowerCase().replace(/\s+/g, '');
    const a = (b.author || '').toLowerCase().replace(/\s+/g, '');
    return `${t}|${a}`;
  }
  function getCur(b) {
    const k = bookKey(b);
    if (!state.curation[k]) state.curation[k] = {};
    return state.curation[k];
  }

  // 오늘 KST
  function todayKST() {
    const d = new Date();
    const k = new Date(d.getTime() + d.getTimezoneOffset()*60000 + 9*3600000);
    return `${k.getFullYear()}-${String(k.getMonth()+1).padStart(2,'0')}-${String(k.getDate()).padStart(2,'0')}`;
  }
  function referenceDate() {
    const all = [...(datasets.manga.books || []), ...(datasets.indie.books || [])];
    let maxFS = '';
    for (const b of all) { const fs = b.first_seen || ''; if (fs > maxFS) maxFS = fs; }
    return maxFS || todayKST();
  }

  function renderStats() {
    const books = datasets[state.tab].books || [];
    const ref = referenceDate();
    let today = 0, picked = 0, hidden = 0;
    for (const b of books) {
      if (b.first_seen === ref) today++;
      const c = state.curation[bookKey(b)];
      if (c) {
        if (c.pick) picked++;
        if (c.hide) hidden++;
      }
    }
    document.getElementById('s-today').textContent = today;
    document.getElementById('s-total').textContent = books.length;
    document.getElementById('s-pick').textContent = picked;
    document.getElementById('s-hide').textContent = hidden;
  }

  function renderList() {
    const books = datasets[state.tab].books || [];
    const list = document.getElementById('list');
    list.innerHTML = '';

    const filtered = books.filter(b => {
      const c = state.curation[bookKey(b)] || {};
      if (state.filter === 'picked') return !!c.pick;
      if (state.filter === 'hidden') return !!c.hide;
      if (state.filter === 'noted') return !!(c.note && c.note.trim());
      if (state.filter === 'unreviewed') return !c.pick && !c.hide && !(c.note && c.note.trim());
      return true; // all
    });

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty"><div class="icon">📭</div>조건에 맞는 책 없음</div>';
      return;
    }

    for (const b of filtered) {
      const c = state.curation[bookKey(b)] || {};
      const row = document.createElement('div');
      row.className = 'row';
      if (c.hide) row.classList.add('hidden-row');
      if (c.pick) row.classList.add('picked-row');
      if (c.note && c.note.trim()) row.classList.add('note-open');

      // cover
      const cov = document.createElement('div'); cov.className = 'cover';
      if (b.cover) {
        const img = document.createElement('img');
        img.loading = 'lazy'; img.referrerPolicy = 'no-referrer';
        img.src = b.cover; img.alt = b.title || '';
        img.onerror = function() {
          this.remove();
          const ph = document.createElement('div'); ph.className = 'ph'; ph.textContent = b.title || '';
          cov.appendChild(ph);
        };
        cov.appendChild(img);
      } else {
        const ph = document.createElement('div'); ph.className = 'ph'; ph.textContent = b.title || '';
        cov.appendChild(ph);
      }
      row.appendChild(cov);

      // body
      const body = document.createElement('div'); body.className = 'body';
      const t = document.createElement('div'); t.className = 'title'; t.textContent = b.title || '';
      const who = document.createElement('div'); who.className = 'who';
      who.textContent = [b.author, b.publisher].filter(Boolean).join(' · ');
      const src = document.createElement('div'); src.className = 'src';
      src.textContent = b.source_label || b.source || '';
      body.appendChild(t); body.appendChild(who); body.appendChild(src);
      row.appendChild(body);

      // actions
      const actions = document.createElement('div'); actions.className = 'actions';
      const btnPick = document.createElement('button');
      btnPick.textContent = '⭐'; btnPick.title = 'pick';
      if (c.pick) btnPick.classList.add('on-pick');
      btnPick.onclick = () => {
        const cur = getCur(b);
        cur.pick = !cur.pick;
        if (cur.pick) cur.hide = false;
        persist(); render();
        toast(cur.pick ? '⭐ 픽' : '⭐ 해제');
      };
      const btnNote = document.createElement('button');
      btnNote.textContent = '📝'; btnNote.title = 'note';
      if (c.note && c.note.trim()) btnNote.classList.add('on-note');
      btnNote.onclick = () => {
        row.classList.toggle('note-open');
        if (row.classList.contains('note-open')) {
          const ta = row.querySelector('textarea');
          if (ta) ta.focus();
        }
      };
      const btnHide = document.createElement('button');
      btnHide.textContent = '🙈'; btnHide.title = 'hide';
      if (c.hide) btnHide.classList.add('on-hide');
      btnHide.onclick = () => {
        const cur = getCur(b);
        cur.hide = !cur.hide;
        if (cur.hide) cur.pick = false;
        persist(); render();
        toast(cur.hide ? '🙈 숨김' : '🙈 해제');
      };
      actions.appendChild(btnPick);
      actions.appendChild(btnNote);
      actions.appendChild(btnHide);
      row.appendChild(actions);

      // note area
      const noteArea = document.createElement('div'); noteArea.className = 'note-area';
      const ta = document.createElement('textarea');
      ta.placeholder = '메모 (예: 이 책 6월에 푸시할 것)';
      ta.value = c.note || '';
      let debounceTimer;
      ta.oninput = () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          const cur = getCur(b);
          cur.note = ta.value;
          persist(); renderStats();
          // btnNote on/off 표시 갱신
          if (cur.note && cur.note.trim()) btnNote.classList.add('on-note');
          else btnNote.classList.remove('on-note');
        }, 400);
      };
      noteArea.appendChild(ta);
      row.appendChild(noteArea);

      list.appendChild(row);
    }
  }

  function render() { renderStats(); renderList(); }

  // 탭
  document.querySelectorAll('.seg').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.seg').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
      state.tab = el.dataset.tab;
      render();
    });
  });
  // 칩
  document.querySelectorAll('.chip').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
      state.filter = el.dataset.filter;
      renderList();
    });
  });

  // I/O
  document.getElementById('btn-export').onclick = () => {
    const out = { _v: 1, _at: new Date().toISOString(), curation: state.curation };
    const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `eunjae-curation-${todayKST()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('JSON 내보냄');
  };
  document.getElementById('btn-import').onclick = () => {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = 'application/json';
    inp.onchange = e => {
      const f = e.target.files[0]; if (!f) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          if (data.curation) {
            state.curation = data.curation;
            persist(); render(); toast('가져옴 ✓');
          } else toast('형식이 다름');
        } catch (err) { toast('실패: ' + err.message); }
      };
      reader.readAsText(f);
    };
    inp.click();
  };
  document.getElementById('btn-reset').onclick = () => {
    if (confirm('모든 큐레이션 (픽·숨김·메모) 을 지웁니다. 진짜?')) {
      state.curation = {}; persist(); render(); toast('초기화');
    }
  };

  render();
</script>
</body>
</html>
