<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>이은재서점 — 오늘의 책</title>
<style>
  :root {
    --bg: #faf8f5;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #888;
    --accent: #c8553d;
    --accent-2: #2a6f5a;
    --accent-3: #4a5b8a;
    --accent-bg: #fff4f1;
    --border: #ececec;
    --chip: #f1ede6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1816; --card: #232120; --text: #f0ece6; --muted: #999;
      --accent: #e88a76; --accent-2: #6fb59c; --accent-3: #8aa0d4;
      --accent-bg: #3a2520; --border: #353230; --chip: #2d2a26;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .container { max-width: 1240px; margin: 0 auto; padding: 32px 24px 80px; }

  /* Header */
  header.top { margin-bottom: 28px; }
  header.top h1 { font-size: 32px; margin: 0 0 4px; letter-spacing: -0.02em; }
  header.top .meta { color: var(--muted); font-size: 13px; }

  section { margin-bottom: 44px; }
  section > h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin: 0 0 14px;
    font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }
  section > h2 .count {
    background: var(--chip); color: var(--text);
    padding: 1px 8px; border-radius: 999px; font-size: 11px; font-weight: 500;
    text-transform: none; letter-spacing: 0;
  }

  /* === 수집 출처 카드 === */
  .sources-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }
  .src-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .src-card.indie { border-left-color: var(--accent); }
  .src-card.indie-visual { border-left-color: var(--accent-2); }
  .src-card.major { border-left-color: var(--accent-3); }
  .src-card .src-name { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
  .src-card .src-section { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .src-card .src-count {
    font-size: 22px; font-weight: 700; letter-spacing: -0.02em;
    color: var(--accent);
  }
  .src-card.indie-visual .src-count { color: var(--accent-2); }
  .src-card.major .src-count { color: var(--accent-3); }
  .src-card .src-count .unit { font-size: 12px; color: var(--muted); font-weight: 500; margin-left: 2px; }
  .src-card .src-method {
    margin-top: 6px;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* === 큐레이션 (서점별 그룹) === */
  .controls {
    position: sticky; top: 0;
    background: var(--bg);
    padding: 10px 0 12px;
    margin-bottom: 16px;
    z-index: 10;
    border-bottom: 1px solid var(--border);
    display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
  }
  .tab {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 13px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
  }
  .tab.active { background: var(--accent); color: white; border-color: var(--accent); }
  .search {
    flex: 1; min-width: 200px; max-width: 320px;
    border: 1px solid var(--border); background: var(--card); color: var(--text);
    padding: 5px 12px; border-radius: 999px; font-size: 12px; font-family: inherit;
  }

  .store-group { margin-bottom: 36px; }
  .store-header {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 8px 0; margin-bottom: 14px;
    border-bottom: 2px solid var(--accent);
  }
  .store-header h3 { margin: 0; font-size: 18px; }
  .store-header .meta { color: var(--muted); font-size: 12px; }

  .section-title {
    margin: 18px 0 10px;
    font-size: 12px; color: var(--accent); font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }
  .section-title .ct {
    color: var(--muted); font-weight: normal;
    background: var(--chip); padding: 1px 7px; border-radius: 999px;
  }

  /* === 책 그리드 === */
  .book-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 22px 14px;
  }
  .book {
    text-decoration: none; color: inherit;
    display: flex; flex-direction: column; position: relative;
  }
  .book .cover-wrap {
    position: relative;
    aspect-ratio: 2 / 3;
    background: var(--card);
    border-radius: 6px; overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    margin-bottom: 10px;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .book:hover .cover-wrap {
    transform: translateY(-3px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
  }
  .book .cover-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .book .cover-wrap.no-cover {
    background: linear-gradient(135deg, var(--chip), var(--card));
    border: 1px solid var(--border);
  }
  .book .cover-wrap.no-cover img { display: none; }
  .book .cover-wrap.no-cover::before {
    content: "📖";
    position: absolute; top: 10px; left: 10px;
    font-size: 18px; opacity: 0.4;
  }
  .book .cover-wrap.no-cover::after {
    content: attr(data-title);
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 28px 14px 14px;
    font-size: 13px; color: var(--text);
    font-weight: 600; line-height: 1.35;
    white-space: pre-wrap;
  }
  .book .badge {
    position: absolute; top: 6px; left: 6px;
    background: var(--accent); color: white;
    font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600;
  }
  .book .src-badge {
    position: absolute; top: 6px; right: 6px;
    background: rgba(0,0,0,0.65); color: white;
    font-size: 10px; padding: 2px 7px; border-radius: 4px;
  }
  .book .title {
    font-size: 13px; font-weight: 600; line-height: 1.3; margin-bottom: 4px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .book .author, .book .publisher { font-size: 11px; color: var(--muted); line-height: 1.3; }

  /* === 내 책장 === */
  .shelf-purchased details {
    margin-bottom: 4px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
  }
  .shelf-purchased summary {
    cursor: pointer; font-size: 13px; font-weight: 600;
    display: flex; justify-content: space-between; align-items: center;
  }
  .shelf-purchased summary::after { content: ""; }
  .shelf-purchased ul {
    margin: 8px 0 0 0; padding-left: 18px;
    list-style: disc; font-size: 13px;
  }
  .shelf-purchased ul li { margin-bottom: 3px; }
  .shelf-purchased ul li .a { color: var(--muted); font-size: 11px; }

  /* 펴보기(더보기) */
  .more-hidden { display: none; }
  .more-hidden.more-open { display: grid; }
  .expand-wrap { margin-top: 16px; text-align: center; }
  .expand-btn {
    background: var(--card); border: 1px solid var(--border); color: var(--accent);
    padding: 7px 18px; border-radius: 999px; cursor: pointer;
    font-size: 12px; font-family: inherit; font-weight: 600;
  }
  .expand-btn:hover { background: var(--accent-bg); border-color: var(--accent); }

  .empty-state {
    padding: 36px 20px; text-align: center; color: var(--muted);
    background: var(--card); border-radius: 10px;
    border: 1px dashed var(--border);
  }
  .empty-state code {
    background: var(--chip); padding: 2px 6px; border-radius: 4px; font-size: 12px;
  }
  .err {
    background: var(--accent-bg); border-left: 3px solid var(--accent);
    padding: 10px 14px; font-size: 12px;
    margin-bottom: 12px; border-radius: 4px;
  }
  .legend {
    display: flex; gap: 14px; flex-wrap: wrap;
    font-size: 11px; color: var(--muted);
    margin-top: 8px;
  }
  .legend span { display: inline-flex; align-items: center; gap: 5px; }
  .legend .dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
  }

  /* 국내/해외 토글 */
  .scope-toggle {
    display: flex; gap: 8px; margin: 0 0 24px;
  }
  .scope-btn {
    flex: 1; max-width: 200px;
    padding: 11px 18px; border-radius: 12px;
    border: 1px solid var(--border); background: var(--card); color: var(--text);
    font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer;
    transition: background .15s, color .15s, border-color .15s;
  }
  .scope-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* === 모바일 최적화 === */
  @media (max-width: 640px) {
    .container { padding: 18px 14px 56px; }
    header.top { margin-bottom: 18px; }
    header.top h1 { font-size: 24px; }
    header.top .meta { font-size: 12px; }
    .scope-toggle { gap: 6px; margin-bottom: 18px; position: sticky; top: 0; z-index: 20; background: var(--bg); padding: 8px 0; }
    .scope-btn { max-width: none; padding: 10px 12px; font-size: 14px; }
    section { margin-bottom: 30px; }
    .controls { gap: 5px; padding: 8px 0 10px; }
    .controls .tab { padding: 5px 11px; font-size: 12px; }
    .search { min-width: 0; flex-basis: 100%; max-width: none; order: 3; margin-top: 4px; }
    .book-grid { grid-template-columns: repeat(auto-fill, minmax(104px, 1fr)); gap: 16px 10px; }
    .book .title { font-size: 12px; }
    .book .author, .book .publisher { font-size: 10px; }
    .store-header h3 { font-size: 16px; }
    .sources-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    h1, h2, h3 { word-break: keep-all; }
  }
</style>
</head>
<body>
<div class="container">

  <header class="top">
    <h1>이은재서점</h1>
    <div class="meta" id="header-meta">로딩 중…</div>
  </header>

  <!-- 국내/해외 토글 (최상단) -->
  <div class="scope-toggle">
    <button class="scope-btn active" data-view="domestic">🇰🇷 국내</button>
    <button class="scope-btn" data-view="overseas">🌍 해외</button>
  </div>

  <!-- ===== 국내 뷰 ===== -->
  <div id="view-domestic">

  <!-- 1. 독립서점 큐레이션 -->
  <section id="indie-section">
    <h2>🏪 독립서점 큐레이션 <span class="count" id="indie-count">…</span></h2>
    <div class="controls">
      <button class="tab indie-tab active" data-store="all">전체</button>
      <span id="indie-store-tabs"></span>
      <input class="search" id="indie-search" placeholder="제목·저자 검색" />
    </div>
    <div id="indie-groups"></div>
  </section>

  <!-- 수집 출처 (맨 아래) -->
  <section id="sources-section">
    <h2>📡 수집 출처 <span class="count" id="sources-count">…</span></h2>
    <div class="sources-grid" id="sources-grid"></div>
    <div class="legend">
      <span><span class="dot" style="background: var(--accent);"></span> 독립서점 — 매일 자동 수집</span>
    </div>
  </section>

  </div><!-- /view-domestic -->

  <!-- ===== 해외 뷰 ===== -->
  <div id="view-overseas" style="display:none">
    <section id="overseas-section">
      <h2>🌍 해외 서점 큐레이션 <span class="count" id="overseas-count">…</span></h2>
      <div class="controls">
        <button class="tab overseas-tab active" data-store="all">전체</button>
        <span id="overseas-store-tabs"></span>
        <input class="search" id="overseas-search" placeholder="제목·서점 검색" />
      </div>
      <div id="overseas-groups"></div>
    </section>
  </div><!-- /view-overseas -->

</div>

<!-- 데이터 (캐시버스팅: 매 로드마다 최신 JSON을 강제로 불러옴) -->
<script>
  (function () {
    var t = Date.now();
    var files = ["indie_books", "overseas_books"];
    files.forEach(function (n) {
      document.write('<scr' + 'ipt src="./data/' + n + '.js?t=' + t + '"><\/scr' + 'ipt>');
    });
  })();
</script>

<script>
const BOOKS = window.__BOOKS_DATA__ || null;
const SHELF = window.__MYSHELF_DATA__ || null;
const INDIE = window.__INDIE_BOOKS_DATA__ || null;
const OVERSEAS = window.__OVERSEAS_BOOKS_DATA__ || null;

// 서점 표시 순서 (목록에 없는 서점은 뒤에 붙음)
const INDIE_STORE_ORDER = ["땡스북스", "더북소사이어티", "고요서사", "사적인서점", "소심한책방", "유어마인드", "북앤스페이스"];
const OVERSEAS_STORE_ORDER = ["Do you read me?!", "Donlon Books", "Magma Books", "Mast Books", "Daunt Books", "Phaidon", "Gestalten"];
function orderStores(arr, order) {
  order = order || INDIE_STORE_ORDER;
  return arr.slice().sort((a, b) => {
    const ia = order.indexOf(a), ib = order.indexOf(b);
    return (ia < 0 ? 99 : ia) - (ib < 0 ? 99 : ib);
  });
}

let indieFilter = "all";
let indieQuery = "";
let overseasFilter = "all";
let overseasQuery = "";
let majorFilter = "all";
let majorQuery = "";

function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}

// === 1. 헤더 + 수집 출처 ===
function renderHeader() {
  const dom = INDIE ? (INDIE.books || []).length : 0;
  const ovs = OVERSEAS ? (OVERSEAS.books || []).length : 0;
  const when = (INDIE && INDIE.updated_at) ? new Date(INDIE.updated_at).toLocaleDateString("ko-KR") : "";
  document.getElementById("header-meta").innerHTML =
    `국내 <b>${dom}권</b> · 해외 <b>${ovs}권</b>${when ? " · " + when + " 갱신" : ""}`;
}

function renderSources() {
  const grid = document.getElementById("sources-grid");
  const sources = [];

  // 독립서점 — 자동 HTTP (Cafe24 기반)
  // 독립서점 — 시각 수집 (Chrome MCP / Instagram)
  // 대형서점 — 매일 자동
  const INDIE_AUTO = new Set(["유어마인드", "소심한책방", "땡스북스", "북앤스페이스", "더북소사이어티", "고요서사", "사적인서점"]);
  const INDIE_VISUAL = new Set(["에그북스"]);

  if (INDIE && INDIE.books) {
    const grouped = {};
    INDIE.books.forEach(b => {
      const key = `${b.store}|${b.section || "큐레이션"}`;
      grouped[key] = (grouped[key] || 0) + 1;
    });
    Object.entries(grouped).forEach(([k, n]) => {
      const [store, section] = k.split("|");
      let cls = "indie";
      let method = "자동 HTTP";
      if (INDIE_VISUAL.has(store)) {
        cls = "indie-visual";
        method = store === "에그북스" ? "Instagram 비전 식별" : "Chrome JS 추출";
      } else if (store === "땡스북스") {
        method = "본문 텍스트 추출";
      }
      sources.push({ name: store, section, count: n, cls, method, kind: "indie" });
    });
  }

  // 대형서점 — books.js 에 source_label 별로 묶기
  if (BOOKS && BOOKS.books) {
    const grouped = {};
    BOOKS.books.forEach(b => {
      const key = `${b.source}|${b.source_label || ""}`;
      grouped[key] = (grouped[key] || 0) + 1;
    });
    Object.entries(grouped).forEach(([k, n]) => {
      const [src, label] = k.split("|");
      sources.push({
        name: src,
        section: label.replace(src + " ", "").replace(src, "") || "신간",
        count: n,
        cls: "major",
        method: "매일 08:00 자동",
        kind: "major"
      });
    });
  }

  // 정렬: 독립 자동 → 독립 시각 → 대형
  const order = { "indie": 0, "indie-visual": 1, "major": 2 };
  sources.sort((a, b) => (order[a.cls] - order[b.cls]) || b.count - a.count);

  grid.innerHTML = sources.map(s => `
    <div class="src-card ${s.cls}">
      <div class="src-name">${s.kind === "indie" ? "🏪" : "📚"} ${esc(s.name)}</div>
      <div class="src-section">${esc(s.section || "")}</div>
      <div class="src-count">${s.count}<span class="unit">권</span></div>
      <div class="src-method">${esc(s.method)}</div>
    </div>
  `).join("");

  document.getElementById("sources-count").textContent = `${sources.length}개 출처`;
}

// === 2. 독립서점 큐레이션 ===
function renderIndieCuration() {
  if (!INDIE || !INDIE.books || !INDIE.books.length) {
    document.getElementById("indie-section").style.display = "none";
    return;
  }
  const books = INDIE.books;
  const byStore = {};
  books.forEach(b => { (byStore[b.store] = byStore[b.store] || []).push(b); });
  const stores = orderStores(Object.keys(byStore));

  document.getElementById("indie-count").textContent = `${books.length}권 / ${stores.length}개 서점`;

  // 서점 탭
  document.getElementById("indie-store-tabs").innerHTML = stores.map(s =>
    `<button class="tab indie-tab" data-store="${esc(s)}">${esc(s)} · ${byStore[s].length}</button>`
  ).join("");

  drawIndieGroups();
  bindIndieControls();
}

function drawIndieGroups() {
  const books = INDIE.books.filter(b => {
    if (indieFilter !== "all" && b.store !== indieFilter) return false;
    if (indieQuery) {
      const hay = [b.title, b.author, b.publisher, b.section].join(" ").toLowerCase();
      if (!hay.includes(indieQuery)) return false;
    }
    return true;
  });
  const byStore = {};
  books.forEach(b => { (byStore[b.store] = byStore[b.store] || []).push(b); });
  const stores = orderStores(Object.keys(byStore));

  const LIMIT = 20;
  document.getElementById("indie-groups").innerHTML = stores.length ? stores.map((store, gi) => {
    const sb = byStore[store];
    const bySection = {};
    sb.forEach(b => { (bySection[b.section || "큐레이션"] = bySection[b.section || "큐레이션"] || []).push(b); });
    let shown = 0; // 서점 전체 기준 20권까지만 펼친 상태로 노출
    const sectionsHtml = Object.entries(bySection).map(([sec, list]) => {
      const visible = [], hidden = [];
      list.forEach(b => { if (shown < LIMIT) { visible.push(b); shown++; } else hidden.push(b); });
      return `
        <div class="section-title">📚 ${esc(sec)} <span class="ct">${list.length}권</span></div>
        <div class="book-grid">${visible.map(b => bookCard(b, store)).join("")}</div>
        ${hidden.length ? `<div class="book-grid more-hidden" data-scope="indie" data-group="${gi}">${hidden.map(b => bookCard(b, store)).join("")}</div>` : ""}
      `;
    }).join("");
    const overflow = sb.length - Math.min(sb.length, LIMIT);
    const btn = overflow > 0
      ? `<div class="expand-wrap"><button class="expand-btn" data-scope="indie" data-group="${gi}" data-label="펴보기 (+${overflow})">펴보기 (+${overflow})</button></div>`
      : "";
    return `
      <div class="store-group">
        <div class="store-header">
          <h3>🏪 ${esc(store)}</h3>
          <span class="meta">${sb.length}권 · ${Object.keys(bySection).length}개 카테고리</span>
        </div>
        ${sectionsHtml}
        ${btn}
      </div>
    `;
  }).join("") : '<div class="empty-state">조건에 맞는 책이 없습니다.</div>';
}

function bookCard(b, badgeText) {
  const cover = b.cover || b.store_cover || "";
  const link = b.buy_link || b.aladin_link || b.store_link || b.aladin_search || "#";
  const shortTitle = (b.title || "").length > 32 ? (b.title || "").slice(0, 32) + "…" : (b.title || "");
  return `
    <a class="book" href="${esc(link)}" target="_blank" rel="noopener" title="${esc(b.title)}">
      <div class="cover-wrap ${cover ? "" : "no-cover"}" data-title="${esc(shortTitle)}">
        ${cover ? `<img src="${esc(cover)}" alt="${esc(b.title)}" loading="lazy" referrerpolicy="no-referrer" onerror="this.parentNode.classList.add('no-cover')"/>` : ""}
        ${badgeText ? `<span class="src-badge">${esc(badgeText)}</span>` : ""}
      </div>
      <div class="title">${esc(b.title)}</div>
      <div class="author">${esc(b.author || "")}</div>
      <div class="publisher">${esc(b.publisher || "")}</div>
    </a>
  `;
}

function bindIndieControls() {
  document.querySelectorAll(".indie-tab").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".indie-tab").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      indieFilter = btn.dataset.store;
      drawIndieGroups();
    });
  });
  document.getElementById("indie-search").addEventListener("input", e => {
    indieQuery = e.target.value.trim().toLowerCase();
    drawIndieGroups();
  });
}

// === 해외 서점 큐레이션 ===
function renderOverseas() {
  if (!OVERSEAS || !OVERSEAS.books || !OVERSEAS.books.length) {
    document.getElementById("overseas-section").innerHTML =
      '<div class="empty-state">해외 서점 데이터가 아직 없습니다.</div>';
    return;
  }
  const byStore = {};
  OVERSEAS.books.forEach(b => { (byStore[b.store] = byStore[b.store] || []).push(b); });
  const stores = orderStores(Object.keys(byStore), OVERSEAS_STORE_ORDER);
  document.getElementById("overseas-count").textContent = `${OVERSEAS.books.length}권 / ${stores.length}개 서점`;
  document.getElementById("overseas-store-tabs").innerHTML = stores.map(s =>
    `<button class="tab overseas-tab" data-store="${esc(s)}">${esc(s)} · ${byStore[s].length}</button>`
  ).join("");
  drawOverseasGroups();
  document.querySelectorAll(".overseas-tab").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".overseas-tab").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      overseasFilter = btn.dataset.store;
      drawOverseasGroups();
    });
  });
  document.getElementById("overseas-search").addEventListener("input", e => {
    overseasQuery = e.target.value.trim().toLowerCase();
    drawOverseasGroups();
  });
}

function drawOverseasGroups() {
  const books = OVERSEAS.books.filter(b => {
    if (overseasFilter !== "all" && b.store !== overseasFilter) return false;
    if (overseasQuery) {
      const hay = [b.title, b.author, b.store, b.section].join(" ").toLowerCase();
      if (!hay.includes(overseasQuery)) return false;
    }
    return true;
  });
  const byStore = {};
  books.forEach(b => { (byStore[b.store] = byStore[b.store] || []).push(b); });
  const stores = orderStores(Object.keys(byStore), OVERSEAS_STORE_ORDER);
  const LIMIT = 20;
  document.getElementById("overseas-groups").innerHTML = stores.length ? stores.map((store, gi) => {
    const sb = byStore[store];
    const city = (sb[0] && sb[0].city) ? sb[0].city : "";
    const visible = sb.slice(0, LIMIT), hidden = sb.slice(LIMIT);
    const overflow = hidden.length;
    return `
      <div class="store-group">
        <div class="store-header">
          <h3>🌍 ${esc(store)}</h3>
          <span class="meta">${city ? esc(city) + " · " : ""}${sb.length}권</span>
        </div>
        <div class="book-grid">${visible.map(b => bookCard(b, store)).join("")}</div>
        ${hidden.length ? `<div class="book-grid more-hidden" data-scope="overseas" data-group="${gi}">${hidden.map(b => bookCard(b, store)).join("")}</div>` : ""}
        ${overflow > 0 ? `<div class="expand-wrap"><button class="expand-btn" data-scope="overseas" data-group="${gi}" data-label="펴보기 (+${overflow})">펴보기 (+${overflow})</button></div>` : ""}
      </div>
    `;
  }).join("") : '<div class="empty-state">조건에 맞는 책이 없습니다.</div>';
}

// === 3. 내 책장 ===
function renderShelf() {
  if (!SHELF) {
    document.getElementById("shelf-section").style.display = "none";
    return;
  }
  // 산 책 — 날짜별 묶음
  const byDate = {};
  (SHELF.purchased || []).forEach(p => { (byDate[p.date] = byDate[p.date] || []).push(p); });
  const dates = Object.keys(byDate).sort().reverse();
  document.getElementById("shelf-count").textContent = `${(SHELF.purchased || []).length}권`;
  document.getElementById("shelf-purchased").innerHTML = dates.map((d, i) => `
    <details ${i === 0 ? "open" : ""}>
      <summary>${esc(d)} <span style="color:var(--muted); font-weight:normal; font-size:12px;">${byDate[d].length}권</span></summary>
      <ul>
        ${byDate[d].map(p => `
          <li>${esc(p.title)} <span class="a">— ${esc(p.author || "")}</span></li>
        `).join("")}
      </ul>
    </details>
  `).join("") || "<div class='empty-state'>구매 기록 없음</div>";

  // 안 산 후속작
  const missing = SHELF.missing || [];
  document.getElementById("missing-count").textContent = `${missing.length}권`;
  document.getElementById("shelf-missing").innerHTML = missing.length ? missing.map(b => {
    const short = (b.title||"").length > 32 ? (b.title||"").slice(0,32)+"…" : (b.title||"");
    return `
    <a class="book" href="${esc(b.link || "#")}" target="_blank" rel="noopener" title="${esc(b.note || "")}">
      <div class="cover-wrap ${b.cover ? "" : "no-cover"}" data-title="${esc(short)}">
        ${b.cover ? `<img src="${esc(b.cover)}" alt="${esc(b.title)}" loading="lazy" referrerpolicy="no-referrer" onerror="this.parentNode.classList.add('no-cover')"/>` : ""}
        <span class="badge">미보유</span>
      </div>
      <div class="title">${esc(b.title)}</div>
      <div class="author">${esc(b.author || "")}</div>
      <div class="publisher">${esc(b.publisher || "")}</div>
      <div style="font-size:10px; color:var(--accent); margin-top:4px;">${esc(b.note || "")}</div>
    </a>
  `;
  }).join("") : '<div class="empty-state">분석된 후속작 후보가 없습니다.</div>';
}

// === 4. 오늘의 신간 (대형서점) ===
function renderMajor() {
  const grid = document.getElementById("major-grid");
  const err = document.getElementById("major-err");
  if (!BOOKS) {
    document.getElementById("major-section").style.display = "none";
    return;
  }
  if (BOOKS.errors && BOOKS.errors.length) {
    err.innerHTML = `<div class="err">크롤링 오류 ${BOOKS.errors.length}건: ${BOOKS.errors.map(esc).join(" / ")}</div>`;
  }
  document.getElementById("major-count").textContent = `${BOOKS.total || 0}권`;
  drawMajor();

  document.querySelectorAll(".major-tab").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".major-tab").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      majorFilter = btn.dataset.filter;
      drawMajor();
    });
  });
  document.getElementById("major-search").addEventListener("input", e => {
    majorQuery = e.target.value.trim().toLowerCase();
    drawMajor();
  });
}

function majorCard(b) {
  const short = (b.title || "").length > 32 ? (b.title || "").slice(0,32)+"…" : (b.title||"");
  return `
    <a class="book" href="${esc(b.link || "#")}" target="_blank" rel="noopener" title="${esc(b.title)}">
      <div class="cover-wrap ${b.cover ? "" : "no-cover"}" data-title="${esc(short)}">
        ${b.cover ? `<img src="${esc(b.cover)}" alt="${esc(b.title)}" loading="lazy" referrerpolicy="no-referrer" onerror="this.parentNode.classList.add('no-cover')"/>` : ""}
        <span class="src-badge">${esc(b.source || "")}</span>
      </div>
      <div class="title">${esc(b.title)}</div>
      <div class="author">${esc(b.author || "")}</div>
      <div class="publisher">${esc(b.publisher || "")}</div>
    </a>`;
}

function drawMajor() {
  const grid = document.getElementById("major-grid");
  const more = document.getElementById("major-more");
  const LIMIT = 20;
  const all = (BOOKS.books || []).filter(b => {
    if (majorFilter !== "all" && b.source !== majorFilter) return false;
    if (majorQuery) {
      const hay = [b.title, b.author, b.publisher].join(" ").toLowerCase();
      if (!hay.includes(majorQuery)) return false;
    }
    return true;
  });
  if (!all.length) {
    grid.innerHTML = '<div class="empty-state">조건에 맞는 책이 없습니다.</div>';
    more.innerHTML = "";
    return;
  }
  const visible = all.slice(0, LIMIT);
  const hidden = all.slice(LIMIT);
  grid.innerHTML = visible.map(majorCard).join("");
  more.innerHTML = hidden.length
    ? `<div class="book-grid more-hidden" data-scope="major" data-group="0">${hidden.map(majorCard).join("")}</div>
       <div class="expand-wrap"><button class="expand-btn" data-scope="major" data-group="0" data-label="펴보기 (+${hidden.length})">펴보기 (+${hidden.length})</button></div>`
    : "";
}

// 펴보기/접기 토글 (위임)
document.addEventListener("click", e => {
  const btn = e.target.closest(".expand-btn");
  if (!btn) return;
  const sel = `.more-hidden[data-scope="${btn.dataset.scope}"][data-group="${btn.dataset.group}"]`;
  const opening = btn.dataset.open !== "1";
  document.querySelectorAll(sel).forEach(el => el.classList.toggle("more-open", opening));
  btn.dataset.open = opening ? "1" : "0";
  btn.textContent = opening ? "접기" : btn.dataset.label;
});

// === 시작 ===
// 국내/해외 토글
document.querySelectorAll(".scope-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".scope-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const v = btn.dataset.view;
    document.getElementById("view-domestic").style.display = (v === "domestic") ? "" : "none";
    document.getElementById("view-overseas").style.display = (v === "overseas") ? "" : "none";
    window.scrollTo(0, 0);
  });
});

renderHeader();
renderSources();
renderIndieCuration();
renderOverseas();
</script>
</body>
</html>
